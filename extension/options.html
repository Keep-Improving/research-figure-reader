<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>科研图片理解助手设置</title>
    <style>
      :root {
        color: #17202a;
        background: #f6f7f9;
        font-family:
          Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 720px;
        margin: 48px auto;
        padding: 0 24px;
      }

      section {
        background: #fff;
        border: 1px solid #dfe4ea;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 12px 32px rgba(23, 32, 42, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      p {
        margin: 0 0 20px;
        color: #52606d;
        line-height: 1.6;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 650;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        height: 42px;
        border: 1px solid #bac4cf;
        border-radius: 6px;
        padding: 0 12px;
        font-size: 15px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        height: 38px;
        border: 1px solid #1f5eff;
        border-radius: 6px;
        background: #1f5eff;
        color: #fff;
        padding: 0 14px;
        font-size: 14px;
        font-weight: 650;
        cursor: pointer;
      }

      button.secondary {
        background: #fff;
        color: #1f5eff;
      }

      #status {
        min-height: 22px;
        margin-top: 14px;
        color: #384452;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>科研图片理解助手设置</h1>
        <p>填写后端 API 地址。自己电脑上运行时保持默认值；部署给他人使用时填写公开可访问的后端地址。</p>
        <label for="apiBaseUrl">后端 API 地址</label>
        <input id="apiBaseUrl" type="url" placeholder="http://127.0.0.1:8787" />
        <div class="actions">
          <button id="saveButton" type="button">保存</button>
          <button id="testButton" class="secondary" type="button">测试连接</button>
        </div>
        <div id="status" role="status" aria-live="polite"></div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
